        var getBootCampProgramIdFromPath = function (pathname) {
          for (var prefixIndex = 0; prefixIndex < bootCampRoutePrefixes.length; prefixIndex += 1) {
            var prefix = bootCampRoutePrefixes[prefixIndex];

            if (!pathname.startsWith(prefix)) {
              continue;

            var candidate = pathname.slice(prefix.length).split('/')[0];

          return null;

          }

          var entries = Array.from(params.entries());
          for (var entryIndex = 0; entryIndex < entries.length; entryIndex += 1) {
            var entry = entries[entryIndex];
            var key = entry[0];
            var value = entry[1];

            if (bootCampPrograms[key]) {

            }

            if ((key === 'program' || key === 'camp') && value && bootCampPrograms[value]) {
              return value;
            }
          }

          return null;

        var canonical = document.head.querySelector('link[rel="canonical"]');
        if (canonical) {
